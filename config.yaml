# ============================================================
# Code Review Bot - Project Configuration
# ============================================================
# Each project has:
#   - jira_project_key: prefix used in Jira issue keys (e.g. EV-123)
#   - engine_repo:     git URL for the engine repository
#   - game_repo:       git URL for the game repository
#   - default_branch:  base branch for diff comparison

projects:
  EV:
    jira_project_key: EV
    name: "EngineVerse"
    engine_repo: "git@gitlab.booming-inc.com:booming/dev/chaos.git"
    game_repo: "git@gitlab.booming-inc.com:booming/dev/engine/cb-engine-verify.git"
    default_branch: main

  CB2:
    jira_project_key: CB2
    name: "CB2"
    engine_repo: "git@gitlab.booming-inc.com:booming/dev/projects/conquerorsblade2/chaos-cb-2.git"
    game_repo: "git@gitlab.booming-inc.com:booming/dev/projects/conquerorsblade2/conquerors-blade-2.git"
    default_branch: main

  Mars:
    jira_project_key: MARS
    name: "Mars"
    engine_repo: "git@gitlab.booming-inc.com:booming/dev/projects/mars/chaos-mars.git"
    game_repo: "git@gitlab.booming-inc.com:booming/dev/projects/mars/mars.git"
    default_branch: main

  Rage:
    jira_project_key: RAGE
    name: "Rage"
    engine_repo: "git@gitlab.booming-inc.com:booming/dev/projects/rage/chaos.git"
    game_repo: "git@gitlab.booming-inc.com:booming/dev/projects/rage/rage.git"
    default_branch: main

# ============================================================
# Repository mirror dir (where Jenkins clones repos for review)
# ============================================================
workspace:
  base_dir: /data/codereview/workspace
  cache_repos: true   # reuse local clones, fetch instead of clone

# ============================================================
# Claude API settings
# ============================================================
claude:
  model: deepseek-v4-flash
  max_tokens: 8192
  review_instructions: |
    You are a senior game engine engineer reviewing a merge request.
    Focus on:
    1. Logic correctness and potential bugs
    2. Performance issues
    3. Code style and maintainability
    4. Security concerns
    5. Missing edge case handling

    Rate each finding as: 🔴 Critical, 🟡 Warning, ℹ️ Suggestion
    Summarize at the end with a count of each severity level.
